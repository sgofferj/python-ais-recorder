# docker-compose.yaml for AIS Recorder
# docker-compose up -d

services:
  mariadb:
    image: mariadb:11.4
    container_name: ais-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpassword}
      MARIADB_DATABASE: ais_recorder
      MARIADB_USER: ${MARIADB_USER:-ais_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-ais_password}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./alembic/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-u", "${MARIADB_USER:-ais_user}", "-p${MARIADB_PASSWORD:-ais_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ais-recorder
    restart: unless-stopped
    environment:
      MARIADB_HOST: mariadb
      MARIADB_PORT: 3306
      MARIADB_DATABASE: ais_recorder
      MARIADB_USER: ${MARIADB_USER:-ais_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-ais_password}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mariadb_data:
